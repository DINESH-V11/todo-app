<!DOCTYPE html>
<html>
<head>
<title>To-Do List</title>

<style>

body{
font-family: Arial;
background:#f4f6f8;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.container{
background:white;
padding:25px;
width:350px;
border-radius:8px;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

h2{
text-align:center;
margin-bottom:20px;
}

.input-area{
display:flex;
gap:10px;
}

input{
flex:1;
padding:10px;
border:1px solid #ccc;
border-radius:5px;
}

button{
padding:10px 15px;
border:none;
background:#007bff;
color:white;
border-radius:5px;
cursor:pointer;
}

button:hover{
background:#0056b3;
}

ul{
list-style:none;
padding:0;
margin-top:20px;
}

li{
display:flex;
justify-content:space-between;
padding:10px;
margin-bottom:8px;
background:#f1f1f1;
border-radius:5px;
}

.delete{
background:red;
padding:5px 8px;
border:none;
color:white;
border-radius:4px;
cursor:pointer;
}

</style>
</head>

<body>

<div class="container">

<h2>My To-Do List</h2>

<div class="input-area">
<input type="text" id="task" placeholder="Enter task">
<button onclick="addTask()">Add</button>
</div>

<ul id="list"></ul>

</div>

<script>

function addTask(){

let task=document.getElementById("task").value;

if(task==="") return;

let li=document.createElement("li");

li.innerHTML = task +
' <button class="delete" onclick="removeTask(this)">X</button>';

document.getElementById("list").appendChild(li);

document.getElementById("task").value="";

}

function removeTask(btn){
btn.parentElement.remove();
}

</script>

</body>
</html>
